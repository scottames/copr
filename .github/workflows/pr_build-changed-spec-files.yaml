---
name: build changed spec files
on:
  pull_request:
    paths:
      - "*/*.spec"
permissions:
  contents: read
  pull-requests: read
concurrency:
  # yamllint disable-line rule:line-length
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: changed spec files
        id: changed-files
        # https://www.stepsecurity.io/blog/harden-runner-detection-tj-actions-changed-files-action-is-compromised
        # yamllint disable-line rule:line-length
        uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad # v47
        with:
          files: |
            **/*.spec
      - name: Set matrix output
        id: set-matrix
        # yamllint disable rule:line-length
        run: |
          build_targets_json=$(jq -c . .github/spec-build-targets.json)
          fedora_versions=$(jq -r '.default_fedora_versions | join(" ")' <<< "$build_targets_json")
          spec_fedora_versions_json=$(jq -c '.spec_overrides' <<< "$build_targets_json")
          files='${{ steps.changed-files.outputs.all_changed_files }}'
          include_array='[]'

          if [ -n "$files" ]; then
            for file in $files; do
              os="ubuntu-24.04"
              file_fedora_versions="$fedora_versions"

              if [[ "$file" == *aarch64.spec ]] || [[ "$file" == *arm.spec ]]; then
                os="ubuntu-24.04-arm"
              fi

              override_versions=$(jq -r --arg spec "$file" '.[$spec] // empty | join(" ")' <<< "$spec_fedora_versions_json")
              if [ -n "$override_versions" ]; then
                file_fedora_versions="$override_versions"
              fi

              for fv in $file_fedora_versions; do
                include_array=$(echo "$include_array" | jq -c \
                  --arg spec "$file" \
                  --arg os "$os" \
                  --arg fv "$fv" \
                  '. += [{"spec-file": $spec, "os": $os, "fedora-version": $fv}]')
              done
            done
          fi

          matrix_json=$(jq -cn --argjson inc "$include_array" '{"include": $inc}')
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
  # yamllint enable rule:line-length
  build-spec:
    name: build ${{ matrix.spec-file }} (F${{ matrix.fedora-version }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        # yamllint disable-line rule:line-length
      - name: dagger build ${{ matrix.spec-file }} (F${{ matrix.fedora-version }})
        # yamllint disable-line rule:line-length
        uses: dagger/dagger-for-github@b81317a976cb7f7125469707321849737cd1b3bc # v7
        with:
          version: "latest"
          verb: call
          # yamllint disable-line rule:line-length
          args: build-spec-file --spec-file "${{ matrix.spec-file }}" --fedora-version "${{ matrix.fedora-version }}"
