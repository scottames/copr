---
name: spec guards
on:
  pull_request:
    paths:
      - "*/*.spec"
      - scripts/add-temporary-spec-patch.sh
      - scripts/check-spec-guards.sh
      - scripts/fix-spec-guards.sh
      - scripts/test-check-spec-guards.sh
      - scripts/test-spec-helper-scripts.sh
      - scripts/test-voxtype-renovate-checksum.sh
      - scripts/test-zennotes-renovate-checksum.sh
      - .github/renovate.json5
      - .github/spec-build-targets.json
      - .github/workflows/spec-guards.yaml
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  # yamllint disable-line rule:line-length
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  spec-guards:
    runs-on: ubuntu-latest
    container: fedora:44@sha256:6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898
    steps:
      - name: Install dependencies
        run: dnf install -y git jq rpm
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Trust workspace git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Run spec guard tests
        run: scripts/test-check-spec-guards.sh
      - name: Run spec helper tests
        run: scripts/test-spec-helper-scripts.sh
      - name: Run Voxtype Renovate checksum tests
        run: scripts/test-voxtype-renovate-checksum.sh
      - name: Run ZenNotes Renovate checksum tests
        run: scripts/test-zennotes-renovate-checksum.sh
      - name: Run spec guards
        run: scripts/check-spec-guards.sh
